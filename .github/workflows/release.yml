name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/kaskol10/cnpg-migrator
  CHART_PATH: k8s/helm/cnpg-migrator
  CHART_OCI: oci://ghcr.io/kaskol10/charts

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Vet Go code
        working-directory: backend
        run: |
          go mod download
          go vet ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint Helm chart
        run: helm lint "$CHART_PATH"

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            chart_version="${version}"
          else
            version="${GITHUB_SHA::7}"
            chart_version="0.1.0+${version}"
          fi
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"

      - name: Patch chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.chart_version }}/" "$CHART_PATH/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.app_version }}\"/" "$CHART_PATH/Chart.yaml"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in Helm to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Package Helm chart
        run: helm package "$CHART_PATH" --destination packaging

      - name: Push Helm chart to GHCR
        run: |
          helm push "packaging/cnpg-migrator-${{ steps.version.outputs.chart_version }}.tgz" "$CHART_OCI"

      - name: Summary
        run: |
          {
            echo "### Published artifacts"
            echo ""
            echo "**Container image**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Helm chart**"
            echo '```'
            echo "helm install cnpg-migrator ${{ env.CHART_OCI }}/cnpg-migrator \\"
            echo "  --version ${{ steps.version.outputs.chart_version }} \\"
            echo "  --namespace cnpg-migrator --create-namespace"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
