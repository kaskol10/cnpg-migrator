name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: npm ci && npm run build

  helm:
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint chart
        run: helm lint k8s/helm/cnpg-migrator

      - name: Render chart
        run: helm template cnpg-migrator k8s/helm/cnpg-migrator --namespace cnpg-migrator

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: cnpg-migrator:ci
          provenance: false

      - name: Verify arm64 binary
        run: |
          docker run --rm --platform linux/arm64 --entrypoint file cnpg-migrator:ci ./server | grep -q 'ELF.*aarch64'
