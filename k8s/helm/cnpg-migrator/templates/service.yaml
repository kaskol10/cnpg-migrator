apiVersion: v1
kind: Service
metadata:
  name: {{ include "cnpg-migrator.fullname" . }}
  namespace: {{ include "cnpg-migrator.namespace" . }}
  labels:
    {{- include "cnpg-migrator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cnpg-migrator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
